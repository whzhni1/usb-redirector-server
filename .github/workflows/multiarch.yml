name: Build USB Redirector Server (Multi-Arch)

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  OPENWRT_BRANCH: openwrt-22.03

jobs:
  build:
    name: Build ${{ matrix.target }}/${{ matrix.subtarget }}
    runs-on: ubuntu-latest
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64
            subtarget: generic
          - target: arm
            subtarget: armv7
          - target: armeb
            subtarget: generic
          - target: x86
            subtarget: generic
          - target: x86_64
            subtarget: generic
          - target: mips
            subtarget: generic
          - target: mipsel
            subtarget: generic
          - target: mips64
            subtarget: generic
          - target: mips64el
            subtarget: generic

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Cache downloads and ccache
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            .ccache
          key: dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ matrix.target }}-${{ matrix.subtarget }}-${{ hashFiles('usb-redirector-server/**') }}
          restore-keys: |
            dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ matrix.target }}-${{ matrix.subtarget }}-
            dl-ccache-${{ env.OPENWRT_BRANCH }}-

      - name: Prepare OpenWrt
        run: |
          git clone --branch $OPENWRT_BRANCH https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          cp -r $GITHUB_WORKSPACE/usb-redirector-server package/

      - name: Configure & Build Package
        working-directory: openwrt
        run: |
          echo "CONFIG_TARGET_${{ matrix.target }}=y" >> .config
          echo "CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y" >> .config
          echo "CONFIG_PACKAGE_usb-redirector-server=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-redirector-server=y" >> .config
          make defconfig
          make package/usb-redirector-server/{clean,compile} V=s -j$(nproc)

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: usb-redirector-${{ matrix.target }}-${{ matrix.subtarget }}
          path: |
            openwrt/bin/packages/*/usb-redirector-server_*.ipk
            openwrt/bin/targets/*/*/kmod-usb-redirector-server_*.ipk
