name: Build IPK packages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm_cortex-a7, arm_cortex-a9, aarch64_cortex-a53, mipsel_24kc, mips_24kc, x86_64]

    steps:
    - uses: actions/checkout@v3

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git wget unzip

    - name: Setup OpenWrt SDK
      run: |
        mkdir -p sdk
        cd sdk
        case ${{ matrix.arch }} in
          "arm_cortex-a7")
            wget https://downloads.openwrt.org/releases/22.03.5/targets/armvirt/32/openwrt-sdk-22.03.5-armvirt-32_gcc-11.2.0_musl_eabi.Linux-x86_64.tar.xz
            ;;
          "arm_cortex-a9")
            wget https://downloads.openwrt.org/releases/22.03.5/targets/armvirt/32/openwrt-sdk-22.03.5-armvirt-32_gcc-11.2.0_musl_eabi.Linux-x86_64.tar.xz
            ;;
          "aarch64_cortex-a53")
            wget https://downloads.openwrt.org/releases/22.03.5/targets/armvirt/64/openwrt-sdk-22.03.5-armvirt-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
            ;;
          "mipsel_24kc")
            wget https://downloads.openwrt.org/releases/22.03.5/targets/ramips/mt7621/openwrt-sdk-22.03.5-ramips-mt7621_gcc-11.2.0_musl.Linux-x86_64.tar.xz
            ;;
          "mips_24kc")
            wget https://downloads.openwrt.org/releases/22.03.5/targets/ath79/generic/openwrt-sdk-22.03.5-ath79-generic_gcc-11.2.0_musl.Linux-x86_64.tar.xz
            ;;
          "x86_64")
            wget https://downloads.openwrt.org/releases/22.03.5/targets/x86/64/openwrt-sdk-22.03.5-x86-64_gcc-11.2.0_musl.Linux-x86_64.tar.xz
            ;;
        esac
        tar xf *.tar.xz
        mv openwrt-sdk-* openwrt-sdk

    - name: Build packages
      run: |
        cd sdk/openwrt-sdk
        echo "src-link local /github/workspace" >> feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        echo "CONFIG_PACKAGE_usb-redirector-server=y" >> .config
        echo "CONFIG_PACKAGE_kmod-usb-redirector-server=y" >> .config
        make defconfig
        make package/usb-redirector-server/compile V=s
        make package/kmod-usb-redirector-server/compile V=s

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ipk-packages-${{ matrix.arch }}
        path: sdk/openwrt-sdk/bin/packages/${{ matrix.arch }}/base/*.ipk

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: sdk/openwrt-sdk/bin/packages/${{ matrix.arch }}/base/*.ipk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
