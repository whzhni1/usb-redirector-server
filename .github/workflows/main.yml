name: Build USB Redirector Server for OpenWrt

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target:
        description: 'OpenWrt Target'
        required: false
        default: 'mediatek'
      subtarget:
        description: 'OpenWrt Subtarget'
        required: false
        default: 'filogic'

env:
  OPENWRT_VERSION: v23.05.3
  TARGET: ${{ github.event.inputs.target || 'mediatek' }}
  SUBTARGET: ${{ github.event.inputs.subtarget || 'filogic' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout USB Redirector Server
      uses: actions/checkout@v3

    - name: Verify repository structure
      run: |
        echo "=== Repository structure ==="
        ls -la
        echo ""
        echo "=== files/bin directory ==="
        ls -la files/bin/ || echo "files/bin not found"
        echo ""
        echo "=== Checking aarch64-muslhf binaries ==="
        ls -la files/bin/aarch64-muslhf/ || echo "aarch64-muslhf not found"
        
        # Check if files are executable
        if [ -f "files/bin/aarch64-muslhf/usbsrv" ]; then
          echo "usbsrv found, checking if executable:"
          ls -la files/bin/aarch64-muslhf/usbsrv
        else
          echo "ERROR: usbsrv not found in files/bin/aarch64-muslhf/"
        fi

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo apt-get clean
        df -h

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          ecj \
          fastjar \
          file \
          g++ \
          gawk \
          gettext \
          git \
          java-propose-classpath \
          libelf-dev \
          libncurses-dev \
          libssl-dev \
          python3 \
          python3-dev \
          python3-distutils \
          python3-setuptools \
          rsync \
          subversion \
          swig \
          time \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev \
          libboost-dev

    - name: Clone OpenWrt
      run: |
        git clone --depth 1 --branch ${{ env.OPENWRT_VERSION }} https://github.com/openwrt/openwrt.git
        cd openwrt
        echo "OpenWrt commit: $(git rev-parse HEAD)"

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Prepare USB Redirector package
      run: |
        # Create package directory in OpenWrt
        mkdir -p openwrt/package/usb-redirector-server
        
        # Copy all files preserving structure
        echo "=== Copying package files to OpenWrt ==="
        cp -r Makefile openwrt/package/usb-redirector-server/
        cp -r src openwrt/package/usb-redirector-server/
        cp -r files openwrt/package/usb-redirector-server/
        
        # Verify files were copied correctly
        echo ""
        echo "=== Verifying copied files ==="
        echo "Package directory contents:"
        ls -la openwrt/package/usb-redirector-server/
        
        echo ""
        echo "Files/bin directory:"
        ls -la openwrt/package/usb-redirector-server/files/bin/ || echo "files/bin not found"
        
        echo ""
        echo "aarch64-muslhf directory:"
        ls -la openwrt/package/usb-redirector-server/files/bin/aarch64-muslhf/ || echo "aarch64-muslhf not found"
        
        # Fix permissions
        if [ -d "openwrt/package/usb-redirector-server/files/bin" ]; then
          echo ""
          echo "=== Setting executable permissions ==="
          find openwrt/package/usb-redirector-server/files/bin -type f -name "usbsrv*" -exec chmod +x {} \;
          find openwrt/package/usb-redirector-server/files/bin -type f -name "*.init" -exec chmod +x {} \;
        fi
        
        # Fix Makefile tabs (convert spaces to tabs for recipe lines)
        sed -i 's/^[ ]\+\([$(]\)/\t\1/g' openwrt/package/usb-redirector-server/Makefile

    - name: Debug package structure before build
      run: |
        echo "=== Final package structure check ==="
        cd openwrt/package/usb-redirector-server
        
        echo "Current directory: $(pwd)"
        echo ""
        echo "Directory tree:"
        find . -type d | head -20
        echo ""
        echo "Binary files:"
        find files/bin -type f -name "usb*" 2>/dev/null || echo "No USB binary files found"
        
        echo ""
        echo "Testing file access:"
        if [ -f "files/bin/aarch64-muslhf/usbsrv" ]; then
          echo "SUCCESS: files/bin/aarch64-muslhf/usbsrv exists"
          file files/bin/aarch64-muslhf/usbsrv
        else
          echo "ERROR: files/bin/aarch64-muslhf/usbsrv NOT FOUND"
          echo "Creating missing directory and copying from aarch64-gnueabi if available..."
          if [ -d "files/bin/aarch64-gnueabi" ] && [ ! -d "files/bin/aarch64-muslhf" ]; then
            cp -r files/bin/aarch64-gnueabi files/bin/aarch64-muslhf
            echo "Created aarch64-muslhf from aarch64-gnueabi"
          fi
        fi

    - name: Configure OpenWrt for target platform
      run: |
        cd openwrt
        
        # Create configuration
        cat > .config << EOF
        CONFIG_TARGET_${{ env.TARGET }}=y
        CONFIG_TARGET_${{ env.TARGET }}_${{ env.SUBTARGET }}=y
        CONFIG_TARGET_BOARD="${{ env.TARGET }}"
        CONFIG_TARGET_SUBTARGET="${{ env.SUBTARGET }}"
        CONFIG_ALL_KMODS=y
        CONFIG_PACKAGE_kmod-usb-core=y
        CONFIG_PACKAGE_kmod-usb2=y
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-ohci=y
        CONFIG_PACKAGE_kmod-usb-uhci=y
        CONFIG_PACKAGE_kmod-usb-ehci=y
        CONFIG_PACKAGE_librt=y
        CONFIG_PACKAGE_libstdcpp=y
        CONFIG_PACKAGE_libpthread=y
        CONFIG_PACKAGE_kmod-usb-redirector-server=m
        CONFIG_PACKAGE_usb-redirector-server=m
        CONFIG_KERNEL_BUILD_USER="github-actions"
        CONFIG_KERNEL_BUILD_DOMAIN="github.com"
        CONFIG_CCACHE=y
        EOF
        
        # Expand configuration
        make defconfig

    - name: Download package sources
      run: |
        cd openwrt
        make download -j8 V=s || make download -j1 V=s
        
        # Remove incomplete downloads
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build tools
      run: |
        cd openwrt
        echo "Building host tools..."
        make tools/compile -j$(nproc) V=w || make tools/compile -j1 V=s

    - name: Build toolchain
      run: |
        cd openwrt
        echo "Building cross-compile toolchain..."
        make toolchain/compile -j$(nproc) V=w || make toolchain/compile -j1 V=s

    - name: Build kernel and kmods
      run: |
        cd openwrt
        echo "Building Linux kernel..."
        make target/linux/compile -j$(nproc) V=w || make target/linux/compile -j1 V=s

    - name: Build USB Redirector packages
      run: |
        cd openwrt
        
        echo "=== Building USB Redirector packages ==="
        
        # One more check before build
        echo "Final check - package files:"
        ls -la package/usb-redirector-server/files/bin/aarch64-muslhf/ 2>/dev/null || {
          echo "WARNING: aarch64-muslhf still missing, trying to fix..."
          cd package/usb-redirector-server
          if [ -d "files/bin/aarch64-gnueabi" ]; then
            mkdir -p files/bin/aarch64-muslhf
            cp -v files/bin/aarch64-gnueabi/* files/bin/aarch64-muslhf/
            chmod +x files/bin/aarch64-muslhf/*
          fi
          cd ../..
        }
        
        # Clean previous builds
        make package/usb-redirector-server/clean V=s
        
        # Build the package
        make package/usb-redirector-server/compile V=s || {
          echo "Build failed, showing detailed error:"
          make package/usb-redirector-server/compile V=s
          exit 1
        }
        
        # Generate package index
        make package/index V=s

    - name: Collect build artifacts
      run: |
        cd openwrt
        
        # Create artifacts directory
        mkdir -p ../artifacts
        
        # Find and copy packages
        echo "Searching for built packages..."
        find bin/ -name "kmod-usb-redirector-server*.ipk" -exec cp -v {} ../artifacts/ \;
        find bin/ -name "usb-redirector-server*.ipk" ! -name "kmod-*" -exec cp -v {} ../artifacts/ \;
        
        # Create package info
        cat > ../artifacts/package-info.txt << EOF
        Build Date: $(date)
        OpenWrt Version: ${{ env.OPENWRT_VERSION }}
        Target: ${{ env.TARGET }}/${{ env.SUBTARGET }}
        
        Packages built:
        EOF
        
        ls -lah ../artifacts/*.ipk >> ../artifacts/package-info.txt 2>/dev/null || echo "No packages found" >> ../artifacts/package-info.txt
        
        # Display results
        echo "=== Build Artifacts ==="
        cat ../artifacts/package-info.txt

    - name: Upload packages
      uses: actions/upload-artifact@v3
      with:
        name: usb-redirector-${{ env.TARGET }}-${{ env.SUBTARGET }}
        path: |
          artifacts/*.ipk
          artifacts/package-info.txt
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs-${{ env.TARGET }}-${{ env.SUBTARGET }}
        path: |
          openwrt/logs/
          openwrt/build_dir/target-*/linux-*/linux-*/.config
          openwrt/package/usb-redirector-server/
        retention-days: 7
