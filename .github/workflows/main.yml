name: build-ImmortalWrt-usb-redirector-aarch64-debug

on:
  workflow_dispatch:
    inputs:
      ImmortalWrt_branch:
        description: 'ImmortalWrt branch or tag'
        default: 'v24.10.2'
      target:
        description: 'ImmortalWrt TARGET'
        default: 'aarch64'
      subtarget:
        description: 'ImmortalWrt SUBTARGET'
        default: 'generic'
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Shanghai
      OPENWRT_BRANCH: ${{ inputs.ImmortalWrt_branch || 'v24.10.2' }}
      TARGET: ${{ inputs.target || 'aarch64' }}
      SUBTARGET: ${{ inputs.subtarget || 'generic' }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      MAKE_JOBS: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -x
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync unzip \
            file wget subversion zlib1g-dev ccache time xsltproc

      - name: Cache dl and ccache
        uses: actions/cache@v4
        with:
          path: |
            ImmortalWrt/dl
            .ccache
          key: dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ github.sha }}
          restore-keys: |
            dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-
            dl-ccache-${{ env.OPENWRT_BRANCH }}-

      - name: Clone ImmortalWrt
        run: |
          set -x
          rm -rf ImmortalWrt
          git clone --depth 1 -b "${OPENWRT_BRANCH}" https://github.com/ImmortalWrt/ImmortalWrt.git

      - name: Add package into ImmortalWrt tree
        run: |
          set -x
          mkdir -p ImmortalWrt/package/usb-redirector-server
          if [ -f Makefile ] && grep -q "include \$(INCLUDE_DIR)/package.mk" Makefile; then
            rsync -a --delete ./ ImmortalWrt/package/usb-redirector-server/ \
              --exclude .git --exclude .github --exclude ImmortalWrt
          elif [ -d usb-redirector-server ]; then
            rsync -a --delete usb-redirector-server/ ImmortalWrt/package/usb-redirector-server/ \
              --exclude .git --exclude .github --exclude ImmortalWrt
          else
            echo "❌ 未找到包 Makefile"
            exit 1
          fi
          echo "包目录结构："
          ls -R ImmortalWrt/package/usb-redirector-server || true

      - name: Prepare feeds
        working-directory: ImmortalWrt
        run: |
          set -x
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure target and packages
        working-directory: ImmortalWrt
        run: |
          set -x
          cat > .config <<EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_BOARD="${TARGET}"
          CONFIG_TARGET_SUBTARGET="${SUBTARGET}"
          CONFIG_PACKAGE_usb-redirector-server=y
          CONFIG_PACKAGE_kmod-usb-redirector-server=y
          CONFIG_CCACHE=y
          EOF
          cat .config
          make defconfig

      - name: Bootstrap toolchain & kernel
        working-directory: ImmortalWrt
        run: |
          set -x
          make -j${MAKE_JOBS} tools/install V=s
          make -j${MAKE_JOBS} toolchain/install V=s
          make -j${MAKE_JOBS} target/linux/prepare V=s
          make -j${MAKE_JOBS} target/linux/compile V=s

      - name: Prepare usb-redirector-server source (first pass)
        working-directory: ImmortalWrt
        run: |
          set -x
          make package/usb-redirector-server/clean V=s
          make package/usb-redirector-server/prepare V=s
          echo "当前 build_dir 中的 usb-redirector-server 源目录："
          find build_dir -maxdepth 3 -type d -name 'usb-redirector-server-*' -print || true

      - name: Inject kernel compatibility patch (debug, with re-prepare)
        working-directory: ImmortalWrt
        continue-on-error: true
        run: |
          set -x
          echo "当前工作目录: $(pwd)"
          ls -R package/usb-redirector-server || true

          mkdir -p package/usb-redirector-server/patches

          echo "写入补丁文件..."
          cat <<'EOF' > package/usb-redirector-server/patches/001-kernel-compat.patch
--- a/src/tusbd/cdev.c
+++ b/src/tusbd/cdev.c
@@ -1,8 +1,14 @@
 #include <linux/module.h>
 #include <linux/device.h>
 #include <linux/fs.h>
 #include <linux/uaccess.h>
 #include <linux/slab.h>
+#include <linux/version.h>
+
+#if LINUX_VERSION_CODE >= KERNEL_VERSION(6,4,0)
+#define class_create(owner, name) class_create(name)
+#define DEV_UEVENT_CONST const
+#else
+#define DEV_UEVENT_CONST
+#endif
 
 /* 其他原有 include/定义保留 */

@@ -60,7 +66,7 @@
-    lIIIlII->dev_uevent=lIIllIII,
+    lIIIlII->dev_uevent=lIIllIII,

@@ -120,7 +126,7 @@
-static int lIIllIII(struct device *dev, struct kobj_uevent_env *env)
+static int lIIllIII(DEV_UEVENT_CONST struct device *dev, struct kobj_uevent_env *env)
 {
     add_uevent_var(env,"MODALIAS=usb-redirector");
     return 0;
 }
EOF

          echo "补丁文件内容:"
          sed -n '1,200p' package/usb-redirector-server/patches/001-kernel-compat.patch

          echo "强制重新 prepare 以应用 patches/*.patch ..."
          make package/usb-redirector-server/clean V=s || true
          make package/usb-redirector-server/prepare V=s || true

          echo "定位源码目录并 dry-run 测试补丁（用于诊断）..."
          PKGDIR=$(find build_dir -type d -path '*/usb-redirector-server-*' | head -n1 || true)
          echo "PKGDIR=$PKGDIR"
          if [ -n "$PKGDIR" ]; then
            find "$PKGDIR" -maxdepth 3 -type f -path '*/src/tusbd/cdev.c' -print || true
            patch -p1 --dry-run -d "$PKGDIR" < package/usb-redirector-server/patches/001-kernel-compat.patch || true
            echo "cdev.c 头部预览："
            sed -n '1,80p' "$PKGDIR/src/tusbd/cdev.c" || true
            echo "搜索 DEV_UEVENT_CONST/版本宏："
            grep -nE 'DEV_UEVENT_CONST|linux/version.h|class_create' "$PKGDIR/src/tusbd/cdev.c" || true
          else
            echo "❌ 未找到 PKGDIR，无法 dry-run"
          fi

          echo "✅ 补丁注入步骤结束（即使失败也继续后续步骤）"

      - name: Build usb-redirector packages (always run)
        working-directory: ImmortalWrt
        if: always()
        continue-on-error: true
        run: |
          set -x
          mkdir -p "${GITHUB_WORKSPACE}/logs"
          make -j${MAKE_JOBS} package/usb-redirector-server/compile V=s 2>&1 | tee "${GITHUB_WORKSPACE}/logs/compile.log" || true
          make -j${MAKE_JOBS} package/usb-redirector-server/install V=s 2>&1 | tee "${GITHUB_WORKSPACE}/logs/install.log" || true
          echo "编译日志大小："
          ls -lh "${GITHUB_WORKSPACE}/logs" || true

      - name: Collect artifacts (always run)
        working-directory: ImmortalWrt
        if: always()
        run: |
          set -x
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          # 收集 ipk
          find bin/packages -type f -name '*usb-redirector-server*.ipk' -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \; || true
          find bin/targets  -type f -name '*usb-redirector-server*.ipk' -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \; || true
          # 收集日志
          cp -v "${GITHUB_WORKSPACE}"/logs/* "${GITHUB_WORKSPACE}/artifacts/" 2>/dev/null || true
          # 校验
          (cd "${GITHUB_WORKSPACE}/artifacts" && sha256sum *.ipk > SHA256SUMS || true)
          echo "📦 收集到的文件:"
          ls -lh "${GITHUB_WORKSPACE}/artifacts" || true

      - name: Upload artifacts (always run)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: usb-redirector-server-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}
          path: artifacts/*
          if-no-files-found: warn
          
      - name: Create GitHub Release (always run)
        uses: softprops/action-gh-release@v1
        if: always()
        with:
          name: "usb-redirector-server-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}"
          tag_name: "build-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}-${{ github.run_id }}"
          files: |
            artifacts/*.ipk
            artifacts/SHA256SUMS
            artifacts/*.log
          body: |
            自动构建的 usb-redirector-server 包
            架构: ${{ env.TARGET }}-${{ env.SUBTARGET }}
            OpenWrt 分支: ${{ env.OPENWRT_BRANCH }}
            构建时间: ${{ github.run_started_at }}
            说明: 本次为调试版工作流，发布中同时附带 compile/install 日志，便于排查。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
