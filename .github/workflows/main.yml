name: build-ImmortalWrt-usb-redirector-aarch64-debug

on:
  workflow_dispatch:
    inputs:
      ImmortalWrt_branch:
        description: 'ImmortalWrt branch or tag'
        default: 'v24.10.2'
      target:
        description: 'ImmortalWrt TARGET'
        default: 'aarch64'
      subtarget:
        description: 'ImmortalWrt SUBTARGET'
        default: 'generic'
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Shanghai
      OPENWRT_BRANCH: ${{ inputs.ImmortalWrt_branch || 'v24.10.2' }}
      TARGET: ${{ inputs.target || 'aarch64' }}
      SUBTARGET: ${{ inputs.subtarget || 'generic' }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      MAKE_JOBS: 4 # 建议根据 runner 的核心数调整，ubuntu-22.04 可能是 2 或 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -x
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync unzip \
            file wget subversion zlib1g-dev ccache time xsltproc

      - name: Cache dl and ccache
        uses: actions/cache@v4
        with:
          path: |
            ImmortalWrt/dl
            .ccache
          key: dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ github.sha }}
          restore-keys: |
            dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-
            dl-ccache-${{ env.OPENWRT_BRANCH }}-

      - name: Clone ImmortalWrt
        run: |
          set -x
          rm -rf ImmortalWrt
          git clone --depth 1 -b "${OPENWRT_BRANCH}" https://github.com/ImmortalWrt/ImmortalWrt.git

      - name: Add package into ImmortalWrt tree # 简化并明确复制路径
        run: |
          set -x
          mkdir -p ImmortalWrt/package/usb-redirector-server
          # 假设当前仓库的 usb-redirector-server 子目录包含 OpenWrt 包的所有内容
          # 将该子目录的内容直接复制到 ImmortalWrt/package/usb-redirector-server/
          rsync -a --delete usb-redirector-server/ ImmortalWrt/package/usb-redirector-server/
          echo "内容已复制到 ImmortalWrt/package/usb-redirector-server/"
          ls -R ImmortalWrt/package/usb-redirector-server || true # 再次确认复制内容

      - name: Prepare feeds
        working-directory: ImmortalWrt
        run: |
          set -x
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure target and packages
        working-directory: ImmortalWrt
        run: |
          set -x
          # 确保 .config 文件中正确启用 usb-redirector-server
          # 尤其是 kmod-usb-redirector-server 是内核模块，需要在内核配置中启用相关 USB 支持
          cat > .config <<EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_BOARD="${TARGET}"
          CONFIG_TARGET_SUBTARGET="${SUBTARGET}"
          
          # 启用 usb-redirector-server 包
          CONFIG_PACKAGE_usb-redirector-server=y
          # 启用 kmod-usb-redirector-server 内核模块包
          CONFIG_PACKAGE_kmod-usb-redirector-server=y
          
          # 启用 CCACHE
          CONFIG_CCACHE=y

          # 确保 USB 支持相关的内核选项被启用，这是 kmod-usb-redirector-server 的前置条件
          # 通常 defconfig 会处理大部分，但这里明确一下
          # 请根据实际情况调整或添加必要的 USB 相关配置
          CONFIG_KERNEL_USB_SUPPORT=y
          # 假设 kmod 依赖 CONFIG_USB_STORAGE 等，这里需要根据 usb-redirector-server 的 Makefile
          # 或者其 Kconfig 文件来判断具体需要哪些内核选项。
          # 通常 OpenWrt 的 make defconfig 会自动拉取依赖的内核模块配置，但如果仍然有问题，
          # 可能需要手动添加更多 CONFIG_KERNEL_xxx=y 的行。
          EOF
          
          # make defconfig 会根据 .config 文件和包的依赖关系生成最终的 .config
          make defconfig
          # 打印 .config 的相关部分，方便调试
          grep -E "CONFIG_PACKAGE_usb-redirector-server|CONFIG_PACKAGE_kmod-usb-redirector-server|CONFIG_KERNEL_USB" .config || true
          grep -E "CONFIG_TARGET_${TARGET}_${SUBTARGET}" .config || true

      - name: Bootstrap toolchain & kernel
        working-directory: ImmortalWrt
        run: |
          set -x
          make -j${MAKE_JOBS} tools/install V=s
          make -j${MAKE_JOBS} toolchain/install V=s
          make -j${MAKE_JOBS} target/linux/prepare V=s
          make -j${MAKE_JOBS} target/linux/compile V=s

      - name: Prepare usb-redirector-server source # 移除 V=s 以免太详细
        working-directory: ImmortalWrt
        run: |
          set -x
          make package/usb-redirector-server/clean
          make package/usb-redirector-server/prepare
          echo "在 build_dir 中查找 usb-redirector-server 的源代码目录："
          find build_dir -maxdepth 3 -type d -name 'usb-redirector-server-*' || true
          # 打印 make package/usb-redirector-server/prepare 过程的详细日志，用于调试
          # make package/usb-redirector-server/prepare V=99  # 如果需要更详细的日志，可以加上 V=99

      - name: Build usb-redirector packages # 确保即使失败也尝试收集日志和文件
        working-directory: ImmortalWrt
        if: always()
        continue-on-error: true # 允许此步骤失败，以便后续步骤可以收集日志
        run: |
          set -x
          echo "尝试编译 usb-redirector-server 包..."
          # 使用 V=s 或 V=99 获取详细的编译日志，这对于调试非常重要
          make -j${MAKE_JOBS} package/usb-redirector-server/compile V=s || true
          echo "尝试安装 usb-redirector-server 包..."
          make -j${MAKE_JOBS} package/usb-redirector-server/install V=s || true
          echo "编译和安装完成，检查生成的文件..."
          find bin/packages -type f -name '*usb-redirector-server*.ipk' || true
          find bin/targets -type f -name '*usb-redirector-server*.ipk' || true
          # 打印完整的编译日志
          # 如果编译失败，日志会非常有用
          # cat logs/package/usb-redirector-server/* || true

      - name: Collect artifacts
        working-directory: ImmortalWrt
        if: always()
        run: |
          set -x
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          # 优先从 bin/packages 查找，这是 OpenWrt 包的标准输出路径
          find bin/packages -type f -name '*usb-redirector-server*.ipk' -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \; || true
          # 确保如果特殊情况下在 bin/targets 中也找到了，也能复制
          find bin/targets  -type f -name '*usb-redirector-server*.ipk' -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \; || true
          
          # 检查artifacts目录是否为空，如果为空则打印提示
          if [ -z "$(ls -A "${GITHUB_WORKSPACE}/artifacts")" ]; then
            echo "⚠️ 未找到任何 usb-redirector-server ipk 文件。"
            echo "请检查上一步骤的编译日志以获取更多信息。"
            # 可以在这里添加更多调试信息，例如：
            # find . -name '*usb-redirector-server*.ipk' # 再次尝试在整个 ImmortalWrt 目录下查找
          else
            echo "已找到 ipk 文件，生成 SHA256SUMS。"
            (cd "${GITHUB_WORKSPACE}/artifacts" && sha256sum *.ipk > SHA256SUMS || true)
          fi
          ls -lh "${GITHUB_WORKSPACE}/artifacts" || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: usb-redirector-server-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}
          path: artifacts/*
          if-no-files-found: warn # 如果没有文件，发出警告而不是失败

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: always() # 即使编译失败也尝试创建 Release，但如果 artifacts 目录为空，不会上传文件
        with:
          name: "usb-redirector-server-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}"
          tag_name: "build-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}-${{ github.run_id }}"
          files: artifacts/* # 只有 artifacts 目录有文件时才会上传
          body: |
            自动构建的 usb-redirector-server 包  
            架构: ${{ env.TARGET }}-${{ env.SUBTARGET }}  
            OpenWrt 分支: ${{ env.OPENWRT_BRANCH }}  
            构建时间: ${{ github.run_started_at }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
