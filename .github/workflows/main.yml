name: Build OpenWrt Package

on:
  workflow_dispatch:

env:
  PACKAGE_NAME: usb-redirector-server
  CACHE_DIR: openwrt-dl-cache

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        sdk: 
          - https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7621/openwrt-sdk-23.05.5-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          - https://downloads.openwrt.org/releases/23.05.5/targets/armvirt/64/openwrt-sdk-23.05.5-armvirt-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore dl cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CACHE_DIR }}
          key: dl-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            dl-

      - name: Download and extract SDK
        run: |
          set -e
          SDK_URL="${{ matrix.sdk }}"
          SDK_FILE=$(basename "$SDK_URL")
          mkdir -p "$CACHE_DIR"
          wget -t 3 -c "$SDK_URL" -P .
          tar -xJf "$SDK_FILE"
          rm -f "$SDK_FILE"
          SDK_PATH=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
          echo "SDK_PATH=$SDK_PATH" >> $GITHUB_ENV
          ln -sf "$GITHUB_WORKSPACE/$CACHE_DIR" "$SDK_PATH/dl"

      - name: Prepare package
        run: |
          cd "$SDK_PATH"
          ./scripts/feeds update -a
          # 只安装当前包和它依赖的公共包，避免 telephony 大包报错
          ./scripts/feeds install $PACKAGE_NAME
          ./scripts/feeds install -a -p packages
          mkdir -p package/$PACKAGE_NAME
          rsync -a --delete "$GITHUB_WORKSPACE"/ package/$PACKAGE_NAME/
          make defconfig

      - name: Build package
        run: |
          cd "$SDK_PATH"
          make package/$PACKAGE_NAME/{clean,compile} V=s

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-${{ matrix.sdk }}
          path: ${{ env.SDK_PATH }}/bin/packages/**/${{ env.PACKAGE_NAME }}_*.ipk
