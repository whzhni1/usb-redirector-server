name: Build OpenWrt USB Redirector Server

on:
  workflow_dispatch:

env:
  OPENWRT_VERSION: 23.05.5
  PACKAGE_NAME: usb-redirector-server
  SDK_PATH: /tmp/openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64-gnueabi
            target: armvirt
            subtarget: 64
          - arch: arm-gnueabi
            target: armvirt
            subtarget: 32
          - arch: arm-gnueabihf
            target: armvirt
            subtarget: 32
          - arch: arm-uclibcgnueabi
            target: armvirt
            subtarget: 32
          - arch: arm-uclibcgnueabihf
            target: armvirt
            subtarget: 32
          - arch: armeb-gnueabi
            target: armvirt
            subtarget: 32
          - arch: armeb-gnueabihf
            target: armvirt
            subtarget: 32
          - arch: i386-gnu
            target: x86
            subtarget: generic
          - arch: mips-gnu
            target: malta
            subtarget: le
          - arch: mips-musl
            target: malta
            subtarget: le
          - arch: mips-uclibc
            target: malta
            subtarget: le
          - arch: mips64-gnu
            target: malta
            subtarget: le
          - arch: mips64el-gnu
            target: malta
            subtarget: le
          - arch: mipsel-gnu
            target: malta
            subtarget: le
          - arch: mipsel-musl
            target: malta
            subtarget: le
          - arch: x86_64-gnu
            target: x86
            subtarget: 64

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-distutils rsync unzip zlib1g-dev file wget zstd curl

      - name: Cache SDK
        uses: actions/cache@v4
        with:
          path: ${{ env.SDK_PATH }}
          key: sdk-${{ matrix.target }}-${{ matrix.subtarget }}

      - name: Download & Extract SDK (Skip if 404)
        run: |
          mkdir -p "$SDK_PATH"
          SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/openwrt-sdk-${OPENWRT_VERSION}-${{ matrix.target }}-${{ matrix.subtarget }}_gcc-12.3.0_musl.Linux-x86_64.tar.zst"

          echo "Checking SDK URL: $SDK_URL"
          if ! curl -sfI "$SDK_URL" > /dev/null; then
            echo "❌ SDK not found for ${{ matrix.arch }} (${{ matrix.target }}/${{ matrix.subtarget }}), skipping..."
            exit 0
          fi

          echo "✅ SDK found, downloading..."
          curl -sSL "$SDK_URL" -o sdk.tar.zst
          tar --use-compress-program=unzstd -xf sdk.tar.zst --strip-components=1 -C "$SDK_PATH"

      - name: Cache dl & toolchain
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SDK_PATH }}/dl
            ${{ env.SDK_PATH }}/staging_dir/toolchain-*
          key: dl-toolchain-${{ matrix.target }}-${{ matrix.subtarget }}

      - name: Prepare package
        run: |
          cd "$SDK_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/${PACKAGE_NAME}
          rsync -a --delete "$GITHUB_WORKSPACE"/ package/${PACKAGE_NAME}/
          make defconfig

      - name: Build package
        run: |
          cd "$SDK_PATH"
          make package/${PACKAGE_NAME}/clean
          make package/${PACKAGE_NAME}/compile V=s

      - name: Upload to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-ipk
          path: |
            ${{ env.SDK_PATH }}/bin/packages/**/${{ env.PACKAGE_NAME }}_*.ipk
            ${{ env.SDK_PATH }}/bin/packages/**/kmod-${{ env.PACKAGE_NAME }}_*.ipk

      - name: Upload to Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.SDK_PATH }}/bin/packages/**/${{ env.PACKAGE_NAME }}_*.ipk
            ${{ env.SDK_PATH }}/bin/packages/**/kmod-${{ env.PACKAGE_NAME }}_*.ipk
          tag_name: v${{ github.run_number }}-${{ matrix.arch }}
          name: Build ${{ github.run_number }} for ${{ matrix.arch }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
