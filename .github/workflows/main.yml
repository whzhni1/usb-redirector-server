name: Build USB Redirector Packages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        path: package/usb-redirector-server

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

    - name: Download OpenWrt SDK
      run: |
        wget https://downloads.openwrt.org/releases/23.05.0/targets/armvirt/64/openwrt-sdk-23.05.0-armvirt-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        tar xf openwrt-sdk-23.05.0-armvirt-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
        mv openwrt-sdk-* openwrt-sdk

    - name: Configure and Build
      run: |
        cd openwrt-sdk
        echo "CONFIG_TARGET_armvirt=y" > .config
        echo "CONFIG_TARGET_armvirt_64=y" >> .config
        echo "CONFIG_TARGET_armvirt_64_Default=y" >> .config
        echo "CONFIG_PACKAGE_usb-redirector-server=y" >> .config
        echo "CONFIG_PACKAGE_kmod-usb-redirector-server=y" >> .config
        make defconfig
        make package/usb-redirector-server/compile V=s

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: usb-redirector-packages
        path: |
          openwrt-sdk/bin/packages/aarch64_generic/base/usb-redirector-server-*.ipk
          openwrt-sdk/bin/packages/aarch64_generic/base/kmod-usb-redirector-server-*.ipk
