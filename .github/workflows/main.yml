name: build-ImmortalWrt-usb-redirector-aarch64

on:
  workflow_dispatch:
    inputs:
      ImmortalWrt_branch:
        description: 'ImmortalWrt branch or tag'
        default: 'v24.10.2'
      target:
        description: 'ImmortalWrt TARGET'
        default: 'aarch64'
      subtarget:
        description: 'ImmortalWrt SUBTARGET'
        default: 'generic'
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Shanghai
      OPENWRT_BRANCH: ${{ inputs.ImmortalWrt_branch || 'v24.10.2' }}
      TARGET: ${{ inputs.target || 'aarch64' }}
      SUBTARGET: ${{ inputs.subtarget || 'generic' }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      MAKE_JOBS: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync unzip \
            file wget subversion zlib1g-dev ccache time xsltproc

      - name: Cache dl and ccache
        uses: actions/cache@v4
        with:
          path: |
            ImmortalWrt/dl
            .ccache
          key: dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ hashFiles('**/*') }}
          restore-keys: |
            dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-
            dl-ccache-${{ env.OPENWRT_BRANCH }}-

      - name: Clone ImmortalWrt
        run: |
          git clone --depth 1 -b "${OPENWRT_BRANCH}" https://github.com/ImmortalWrt/ImmortalWrt.git

      - name: Add package into ImmortalWrt tree
        run: |
          mkdir -p ImmortalWrt/package/usb-redirector-server
          if [ -f Makefile ] && grep -q "include \$(INCLUDE_DIR)/package.mk" Makefile; then
            rsync -a --delete ./ ImmortalWrt/package/usb-redirector-server/ \
              --exclude .git --exclude .github --exclude ImmortalWrt
          elif [ -d usb-redirector-server ]; then
            rsync -a --delete usb-redirector-server/ ImmortalWrt/package/usb-redirector-server/ \
              --exclude .git --exclude .github --exclude ImmortalWrt
          else
            echo "❌ 未找到包 Makefile"
            exit 1
          fi

      - name: Prepare feeds
        working-directory: ImmortalWrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure target and packages
        working-directory: ImmortalWrt
        run: |
          cat > .config <<EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_BOARD="${TARGET}"
          CONFIG_TARGET_SUBTARGET="${SUBTARGET}"
          CONFIG_PACKAGE_usb-redirector-server=y
          CONFIG_PACKAGE_kmod-usb-redirector-server=y
          CONFIG_CCACHE=y
          EOF
          make defconfig

      - name: Bootstrap toolchain & kernel
        working-directory: ImmortalWrt
        run: |
          make -j${MAKE_JOBS} tools/install
          make -j${MAKE_JOBS} toolchain/install
          make -j${MAKE_JOBS} target/linux/prepare
          make -j${MAKE_JOBS} target/linux/compile

      - name: Prepare usb-redirector-server source
        working-directory: ImmortalWrt
        run: |
          make package/usb-redirector-server/clean V=s
          make package/usb-redirector-server/prepare V=s

            - name: Patch for Linux >= 6.4 API changes
              working-directory: ImmortalWrt
            run: |
          set -eux
          PKGDIR="$(find build_dir -type d -path '*/usb-redirector-server-*' | head -n1)"
          CDEV="$PKGDIR/src/tusbd/cdev.c"
          [ -f "$CDEV" ] || { echo "❌ cdev.c not found"; exit 1; }

          # 确保包含版本宏头
          grep -q 'linux/version.h' "$CDEV" || sed -i '1i #include <linux/version.h>' "$CDEV"

          # 先在 class_create 调用前插 #if
          grep -q 'class_create(THIS_MODULE' "$CDEV" && \
            sed -i '/class_create(THIS_MODULE/i #if LINUX_VERSION_CODE >= KERNEL_VERSION(6,4,0)' "$CDEV"

          # 把 >=6.4 调用改成单参
          sed -i 's/class_create(THIS_MODULE[[:space:]]*,[[:space:]]*/class_create(/' "$CDEV"

          # 在调用后插 #else + 旧调用 + #endif
          grep -q '#if LINUX_VERSION_CODE' "$CDEV" && \
            sed -i '/class_create(/a #else\n    lIIIlII = class_create(THIS_MODULE, IIIllII);\n#endif' "$CDEV"

          # 修正 dev_uevent 函数指针签名
          sed -E -i 's/int[[:space:]]*\(\*dev_uevent\)\(struct device \*/int (*dev_uevent)(const struct device */' "$CDEV"
          # 修正 lIIllIII 定义签名
          sed -E -i 's/static int[[:space:]]+lIIllIII[[:space:]]*\(struct device \*/static int lIIllIII(const struct device */' "$CDEV"

      - name: Build usb-redirector packages
        working-directory: ImmortalWrt
        run: |
          make -j${MAKE_JOBS} package/usb-redirector-server/compile V=s
          make -j${MAKE_JOBS} package/usb-redirector-server/install V=s || true

      - name: Collect artifacts
        working-directory: ImmortalWrt
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          find bin/packages -type f -name 'usb-redirector-server_*.ipk' -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \;
          find bin/targets -type f -name 'kmod-usb-redirector-server_*.ipk' -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \;
          (cd "${GITHUB_WORKSPACE}/artifacts" && sha256sum *.ipk > SHA256SUMS || true)
          ls -l "${GITHUB_WORKSPACE}/artifacts"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usb-redirector-server-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}
          path: artifacts/*
          if-no-files-found: error
