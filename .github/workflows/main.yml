name: Build USB Redirector Server for OpenWrt

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  OPENWRT_VERSION: v23.05.3

jobs:
  build:
    runs-on: ubuntu-22.04
    
    strategy:
      matrix:
        target: 
          - arch: x86_64
            config: CONFIG_TARGET_x86=y\nCONFIG_TARGET_x86_64=y
          - arch: ramips_mt7621  
            config: CONFIG_TARGET_ramips=y\nCONFIG_TARGET_ramips_mt7621=y
          - arch: ath79_generic
            config: CONFIG_TARGET_ath79=y\nCONFIG_TARGET_ath79_generic=y

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
        gettext git java-propose-classpath libelf-dev libncurses5-dev \
        libncursesw5-dev libssl-dev python3 python3-dev python3-distutils \
        python3-setuptools unzip wget rsync subversion swig time xsltproc \
        zlib1g-dev libpam0g-dev

    - name: Download OpenWrt source code
      run: |
        git clone https://git.openwrt.org/openwrt/openwrt.git openwrt
        cd openwrt
        git checkout ${{ env.OPENWRT_VERSION }}

    - name: Copy USB Redirector package
      run: |
        cp -r ./usb-redirector-server openwrt/package/

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure OpenWrt build
      run: |
        cd openwrt
        
        # Create base configuration
        echo -e "${{ matrix.target.config }}" > .config
        
        # Add USB Redirector packages configuration
        cat >> .config << EOF
        # USB Redirector Server packages
        CONFIG_PACKAGE_usb-redirector-server=y
        CONFIG_PACKAGE_kmod-usb-redirector-server=y
        
        # USB Support
        CONFIG_USB_SUPPORT=y
        CONFIG_PACKAGE_kmod-usb-core=y
        CONFIG_PACKAGE_kmod-usb-ohci=y
        CONFIG_PACKAGE_kmod-usb-uhci=y
        CONFIG_PACKAGE_kmod-usb2=y
        CONFIG_PACKAGE_kmod-usb3=y
        
        # Build packages
        CONFIG_ALL_KMODS=y
        CONFIG_ALL_NONSHARED=y
        EOF
        
        # Expand configuration with defaults
        make defconfig

    - name: Download dependencies
      run: |
        cd openwrt
        make download -j8 V=s

    - name: Build OpenWrt full
      run: |
        cd openwrt
        make -j$(nproc) V=s

    - name: Build USB Redirector package only (fallback)
      if: failure()
      run: |
        cd openwrt
        make package/usb-redirector-server/clean
        make package/usb-redirector-server/prepare
        make package/usb-redirector-server/compile V=99
        make package/usb-redirector-server/install

    - name: Collect build artifacts
      run: |
        cd openwrt
        mkdir -p artifacts
        
        # Find and copy USB Redirector packages
        find bin/ -name "*usb-redirector-server*.ipk" -exec cp {} artifacts/ \;
        find bin/ -name "*kmod-usb-redirector-server*.ipk" -exec cp {} artifacts/ \;
        
        # List found packages
        ls -la artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: usb-redirector-${{ matrix.target.arch }}
        path: openwrt/artifacts/*.ipk
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          usb-redirector-*/*.ipk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  install-guide:
    runs-on: ubuntu-22.04
    steps:
    - name: Generate installation instructions
      run: |
        cat > INSTALL.md << 'EOF'
        # USB Redirector Server Installation Guide
        
        ## Installation Steps
        
        1. Transfer the built packages to your OpenWrt device:
        ```bash
        scp kmod-usb-redirector-server-*.ipk root@your-device-ip:/tmp/
        scp usb-redirector-server-*.ipk root@your-device-ip:/tmp/
        ```
        
        2. Install packages on your OpenWrt device (kernel module first):
        ```bash
        opkg install /tmp/kmod-usb-redirector-server-*.ipk
        opkg install /tmp/usb-redirector-server-*.ipk
        ```
        
        3. Start the service:
        ```bash
        service usb-redirector-server start
        service usb-redirector-server enable
        ```
        
        ## Manual Build Instructions
        
        If you need to build manually:
        ```bash
        make package/usb-redirector-server/clean
        make package/usb-redirector-server/prepare  
        make package/usb-redirector-server/compile V=99
        make package/usb-redirector-server/install
        ```
        EOF
        
    - name: Upload installation guide
      uses: actions/upload-artifact@v4
      with:
        name: installation-guide
        path: INSTALL.md
