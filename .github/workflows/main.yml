name: Build OpenWrt Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "x86_64"
            sdk: "https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          - arch: "armvirt_64"
            sdk: "https://downloads.openwrt.org/releases/23.05.5/targets/armvirt/64/openwrt-sdk-23.05.5-armvirt-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          - arch: "rockchip-armv8"
            sdk: "https://downloads.openwrt.org/releases/23.05.5/targets/rockchip/armv8/openwrt-sdk-23.05.5-rockchip-armv8_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          - arch: "ramips-mt7621"
            sdk: "https://downloads.openwrt.org/releases/23.05.5/targets/ramips/mt7621/openwrt-sdk-23.05.5-ramips-mt7621_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          - arch: "ath79-generic"
            sdk: "https://downloads.openwrt.org/releases/23.05.5/targets/ath79/generic/openwrt-sdk-23.05.5-ath79-generic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          - arch: "aarch64-gnueabi"
            sdk: "https://downloads.openwrt.org/releases/23.05.5/targets/mediatek/filogic/openwrt-sdk-23.05.5-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
    env:
      PACKAGE_NAME: usb-redirector-server
      SDK_PATH: /tmp/openwrt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-distutils rsync unzip zlib1g-dev file wget
      # 缓存 SDK 解压结果
      - name: Cache SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SDK_PATH }}
          key: sdk-${{ matrix.arch }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            sdk-${{ matrix.arch }}-
      - name: Download & Extract SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$SDK_PATH"
          wget -q "${{ matrix.sdk }}" -O sdk.tar.xz
          tar -xJf sdk.tar.xz --strip-components=1 -C "$SDK_PATH"
      # 缓存 dl & 工具链
      - name: Cache dl & toolchain
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SDK_PATH }}/dl
            ${{ env.SDK_PATH }}/staging_dir/toolchain-*
          key: dl-toolchain-${{ matrix.arch }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: |
            dl-toolchain-${{ matrix.arch }}-
      - name: Prepare package
        run: |
          cd "$SDK_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/${PACKAGE_NAME}
          rsync -a --delete "$GITHUB_WORKSPACE"/ package/${PACKAGE_NAME}/
          make defconfig  # 避免 menuconfig 交互
      - name: Build package
        run: |
          cd "$SDK_PATH"
          make package/${PACKAGE_NAME}/clean
          make package/${PACKAGE_NAME}/compile V=s
      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-ipk
          path: ${{ env.SDK_PATH }}/bin/packages/**/${{ env.PACKAGE_NAME }}_*.ipk
