name: Build USB Redirector Server for OpenWrt

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target:
        description: 'OpenWrt Target'
        required: false
        default: 'mediatek'
      subtarget:
        description: 'OpenWrt Subtarget'
        required: false
        default: 'filogic'

env:
  OPENWRT_VERSION: v23.05.3
  TARGET: ${{ github.event.inputs.target || 'mediatek' }}
  SUBTARGET: ${{ github.event.inputs.subtarget || 'filogic' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout USB Redirector Server
      uses: actions/checkout@v3

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        sudo apt-get clean
        df -h

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          ecj \
          fastjar \
          file \
          g++ \
          gawk \
          gettext \
          git \
          java-propose-classpath \
          libelf-dev \
          libncurses-dev \
          libssl-dev \
          python3 \
          python3-dev \
          python3-distutils \
          python3-setuptools \
          rsync \
          subversion \
          swig \
          time \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev \
          libboost-dev

    - name: Clone OpenWrt
      run: |
        git clone --depth 1 --branch ${{ env.OPENWRT_VERSION }} https://github.com/openwrt/openwrt.git
        cd openwrt
        echo "OpenWrt commit: $(git rev-parse HEAD)"

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Prepare USB Redirector package
      run: |
        # Create package directory in OpenWrt
        mkdir -p openwrt/package/usb-redirector-server
        
        # Copy package files preserving structure
        cp -r Makefile openwrt/package/usb-redirector-server/
        cp -r src openwrt/package/usb-redirector-server/
        cp -r files openwrt/package/usb-redirector-server/
        
        # Fix Makefile tabs (convert spaces to tabs for recipe lines)
        sed -i 's/^[ ]\+\([$(]\)/\t\1/g' openwrt/package/usb-redirector-server/Makefile
        
        # Display package structure
        echo "Package structure:"
        ls -la openwrt/package/usb-redirector-server/
        
        # Check if kernel module source exists
        if [ -d "openwrt/package/usb-redirector-server/src/tusbd" ]; then
          echo "Kernel module source found:"
          ls -la openwrt/package/usb-redirector-server/src/tusbd/
        fi

    - name: Configure OpenWrt for target platform
      run: |
        cd openwrt
        
        # Determine architecture-specific settings
        case "${{ env.TARGET }}_${{ env.SUBTARGET }}" in
          "mediatek_filogic")
            ARCH_SUFFIX="aarch64_cortex-a53"
            ;;
          "ramips_mt7621")
            ARCH_SUFFIX="mipsel_24kc"
            ;;
          "x86_64")
            ARCH_SUFFIX="x86_64"
            ;;
          *)
            ARCH_SUFFIX="unknown"
            ;;
        esac
        
        echo "Building for architecture: $ARCH_SUFFIX"
        
        # Create configuration
        cat > .config << EOF
        CONFIG_TARGET_${{ env.TARGET }}=y
        CONFIG_TARGET_${{ env.TARGET }}_${{ env.SUBTARGET }}=y
        CONFIG_TARGET_BOARD="${{ env.TARGET }}"
        CONFIG_TARGET_SUBTARGET="${{ env.SUBTARGET }}"
        CONFIG_TARGET_ARCH_PACKAGES="$ARCH_SUFFIX"
        CONFIG_ALL_KMODS=y
        CONFIG_PACKAGE_kmod-usb-core=y
        CONFIG_PACKAGE_kmod-usb2=y
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-ohci=y
        CONFIG_PACKAGE_kmod-usb-uhci=y
        CONFIG_PACKAGE_kmod-usb-ehci=y
        CONFIG_PACKAGE_librt=y
        CONFIG_PACKAGE_libstdcpp=y
        CONFIG_PACKAGE_libpthread=y
        CONFIG_PACKAGE_kmod-usb-redirector-server=m
        CONFIG_PACKAGE_usb-redirector-server=m
        CONFIG_KERNEL_BUILD_USER="github-actions"
        CONFIG_KERNEL_BUILD_DOMAIN="github.com"
        CONFIG_CCACHE=y
        EOF
        
        # Expand configuration
        make defconfig

    - name: Download package sources
      run: |
        cd openwrt
        make download -j8 V=s || make download -j1 V=s
        
        # Remove incomplete downloads
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build tools
      run: |
        cd openwrt
        echo "Building host tools..."
        make tools/compile -j$(nproc) V=w || make tools/compile -j1 V=s

    - name: Build toolchain
      run: |
        cd openwrt
        echo "Building cross-compile toolchain..."
        make toolchain/compile -j$(nproc) V=w || make toolchain/compile -j1 V=s

    - name: Build kernel and kmods
      run: |
        cd openwrt
        echo "Building Linux kernel..."
        make target/linux/compile -j$(nproc) V=w || make target/linux/compile -j1 V=s
        
        # Verify kernel build
        echo "Checking kernel build directory:"
        find build_dir -name "linux-*" -type d | head -5

    - name: Build USB Redirector kernel module
      run: |
        cd openwrt
        
        echo "=== Building USB Redirector kernel module ==="
        
        # Clean previous builds
        make package/usb-redirector-server/clean V=s
        
        # Prepare the package
        make package/usb-redirector-server/prepare V=s
        
        # Compile kernel module
        make package/usb-redirector-server/compile V=s || {
          echo "Build failed, showing detailed error:"
          make package/usb-redirector-server/compile V=s
          exit 1
        }

    - name: Build USB Redirector userspace package
      run: |
        cd openwrt
        
        echo "=== Building USB Redirector userspace components ==="
        
        # Build complete package including userspace
        make package/usb-redirector-server/install V=s
        
        # Generate package index
        make package/index V=s

    - name: Collect build artifacts
      run: |
        cd openwrt
        
        # Create artifacts directory
        mkdir -p ../artifacts
        
        # Find and copy kernel module packages
        echo "Searching for kernel module packages..."
        find bin/ -name "kmod-usb-redirector-server*.ipk" -exec cp -v {} ../artifacts/ \;
        
        # Find and copy userspace packages
        echo "Searching for userspace packages..."
        find bin/ -name "usb-redirector-server*.ipk" ! -name "kmod-*" -exec cp -v {} ../artifacts/ \;
        
        # Create package info
        cat > ../artifacts/package-info.txt << EOF
        Build Date: $(date)
        OpenWrt Version: ${{ env.OPENWRT_VERSION }}
        Target: ${{ env.TARGET }}/${{ env.SUBTARGET }}
        
        Packages built:
        EOF
        
        ls -lah ../artifacts/*.ipk >> ../artifacts/package-info.txt 2>/dev/null || echo "No packages found" >> ../artifacts/package-info.txt
        
        # Display results
        echo "=== Build Artifacts ==="
        cat ../artifacts/package-info.txt

    - name: Upload packages
      uses: actions/upload-artifact@v3
      with:
        name: usb-redirector-${{ env.TARGET }}-${{ env.SUBTARGET }}
        path: |
          artifacts/*.ipk
          artifacts/package-info.txt
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs-${{ env.TARGET }}-${{ env.SUBTARGET }}
        path: |
          openwrt/logs/
          openwrt/build_dir/target-*/linux-*/linux-*/.config
          openwrt/build_dir/target-*/linux-*/gpio-button-hotplug/.built
          openwrt/build_dir/target-*/usb-redirector-server*/
        retention-days: 7

    - name: Create release (optional)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v3
      with:
        name: release-packages
        path: artifacts/*.ipk
        retention-days: 90

    - name: Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **OpenWrt Version:** ${{ env.OPENWRT_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Target:** ${{ env.TARGET }}/${{ env.SUBTARGET }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Date:** $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Packages Built" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        ls -lah artifacts/*.ipk 2>/dev/null || echo "No packages found" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
