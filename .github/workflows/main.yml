name: Build USB Redirector Server (OpenWrt 24.10.2)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "x86_64"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-sdk-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "armvirt_64"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/armvirt/64/openwrt-sdk-24.10.2-armvirt-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "rockchip-armv8"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/rockchip/armv8/openwrt-sdk-24.10.2-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "ramips-mt7621"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/ramips/mt7621/openwrt-sdk-24.10.2-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "ath79-generic"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/ath79/generic/openwrt-sdk-24.10.2-ath79-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "mediatek-filogic"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/mediatek/filogic/openwrt-sdk-24.10.2-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"

    env:
      PACKAGE_NAME: usb-redirector-server
      SDK_PATH: /tmp/openwrt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-dev python3-distutils python3-pip \
            rsync unzip zlib1g-dev file wget ccache swig zstd ca-certificates
          python3 -m pip install --upgrade pip setuptools

      - name: Cache SDK
        uses: actions/cache@v4
        with:
          path: ${{ env.SDK_PATH }}
          key: sdk-${{ matrix.arch }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: sdk-${{ matrix.arch }}-

      - name: Download & Extract SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$SDK_PATH"
          wget -q "${{ matrix.sdk }}" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst --strip-components=1 -C "$SDK_PATH"

      - name: Cache dl & toolchain
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SDK_PATH }}/dl
            ${{ env.SDK_PATH }}/staging_dir/toolchain-*
          key: dl-toolchain-${{ matrix.arch }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: dl-toolchain-${{ matrix.arch }}-

      - name: Prepare package and Disable uboot-mediatek
        run: |
          cd "$SDK_PATH"
          ./scripts/feeds update -a
          # 在安装 feeds 之前或之后，确保删除 uboot-mediatek
          # 尝试在 update 后立即删除
          rm -rf feeds/base/package/uboot-mediatek || true # 使用 || true 避免删除不存在的目录时报错
          echo "Removed uboot-mediatek from feeds/base/package to skip its prereq check"

          ./scripts/feeds install -a

          # 再次尝试删除，以防 install -a 重新拉取
          rm -rf feeds/base/package/uboot-mediatek || true
          echo "Re-checked and removed uboot-mediatek after feeds install"

          mkdir -p package/${PACKAGE_NAME}
          rsync -a --delete "$GITHUB_WORKSPACE"/ package/${PACKAGE_NAME}/
          make defconfig

          # 确保在 .config 中禁用它
          sed -i '/CONFIG_PACKAGE_uboot-mediatek/d' .config || true
          echo "# CONFIG_PACKAGE_uboot-mediatek is not set" >> .config || true
          # 重新生成 defconfig，确保更改生效
          make defconfig

      - name: Force-install setuptools into SDK host python
        run: |
          set -eux
          cd "$SDK_PATH"
          HOST_PY=""
          for p in "$SDK_PATH"/staging_dir/host/bin/python3 "$SDK_PATH"/staging_dir/hostpkg/bin/python3; do
            if [ -x "$p" ]; then HOST_PY="$p"; break; fi
          done
          if [ -n "$HOST_PY" ]; then
            echo "SDK host python: $HOST_PY"
            "$HOST_PY" -m ensurepip --upgrade || true
            if ! "$HOST_PY" -m pip --version >/dev/null 2>&1; then
              wget -q https://bootstrap.pypa.io/get-pip.py -O get-pip.py
              "$HOST_PY" get-pip.py
            fi
            "$HOST_PY" -m pip install --upgrade pip setuptools wheel
            PATH="$SDK_PATH/staging_dir/host/bin:$SDK_PATH/staging_dir/hostpkg/bin:$PATH" \
            "$HOST_PY" -c 'import sys,setuptools; print("Host Python:", sys.executable); print("setuptools OK:", setuptools.__version__)'
          else
            echo "Warning: No host python found in SDK staging_dir. This might cause issues."
          fi

      - name: Build package
        run: |
          cd "$SDK_PATH"
          export PATH="$SDK_PATH/staging_dir/host/bin:$SDK_PATH/staging_dir/hostpkg/bin:$PATH"
          echo "Verifying host python and setuptools before final build:"
          which python3 || true
          python3 -c 'import sys; print("Host python3:", sys.executable)' || true
          python3 -c 'import setuptools, sys; print("setuptools:", setuptools.__version__, "at", setuptools.__file__)' || true
          set +e
          make package/${PACKAGE_NAME}/clean
          IGNORE_ERRORS=1 make package/${PACKAGE_NAME}/compile -j$(nproc) V=sc
          exit 0

      - name: Upload ipk artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-ipk
          path: |
            ${{ env.SDK_PATH }}/bin/packages/**/${{ env.PACKAGE_NAME }}_*.ipk
            ${{ env.SDK_PATH }}/bin/packages/**/kmod-usb-redirector-server_*.ipk
