name: OpenWrt Multi-Arch Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { platform: "arm_cortex-a7", target: "ipq40xx", subtarget: "generic" }
          - { platform: "aarch64_generic", target: "rockchip", subtarget: "armv8" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          # 自动判断正确的 distutils 包名
          PY_DIST=$(apt-cache search --names-only '^python3-distutils$' | grep -q python3-distutils && echo "python3-distutils" || echo "python3-stdlib-extensions")
          sudo apt-get install -y \
            build-essential ccache ecj fastjar file g++ gawk gettext git \
            java-propose-classpath libelf-dev libncurses5-dev libncursesw5-dev \
            libssl-dev python3 unzip wget python3-pip python3-setuptools \
            python3-dev $PY_DIST python3-venv \
            rsync subversion swig time xsltproc zlib1g-dev zstd

      - name: Download OpenWrt source
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          # 切到需要的版本，例如 23.05.5
          git checkout v23.05.5

      - name: Feeds update & install
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare config
        run: |
          cd openwrt
          make defconfig
          # 根据 matrix 填充架构
          echo "CONFIG_TARGET_${{ matrix.arch.target }}=y" >> .config
          echo "CONFIG_TARGET_${{ matrix.arch.target }}_${{ matrix.arch.subtarget }}=y" >> .config
          make defconfig

      - name: Build
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.arch.platform }}
          path: openwrt/bin/targets/**/*
