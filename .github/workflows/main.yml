name: Build USB Redirector Server (OpenWrt 24.10.2)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "x86_64"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-sdk-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "armvirt_64"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/armvirt/64/openwrt-sdk-24.10.2-armvirt-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "rockchip-armv8"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/rockchip/armv8/openwrt-sdk-24.10.2-rockchip-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "ramips-mt7621"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/ramips/mt7621/openwrt-sdk-24.10.2-ramips-mt7621_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "ath79-generic"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/ath79/generic/openwrt-sdk-24.10.2-ath79-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - arch: "mediatek-filogic"
            sdk: "https://downloads.openwrt.org/releases/24.10.2/targets/mediatek/filogic/openwrt-sdk-24.10.2-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"

    env:
      PACKAGE_NAME: usb-redirector-server
      SDK_PATH: /tmp/openwrt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3 python3-dev python3-distutils python3-setuptools \
          rsync unzip zlib1g-dev file wget ccache swig zstd

      - name: Cache SDK
        uses: actions/cache@v4
        with:
          path: ${{ env.SDK_PATH }}
          key: sdk-${{ matrix.arch }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: sdk-${{ matrix.arch }}-

      - name: Download & Extract SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$SDK_PATH"
          wget -q "${{ matrix.sdk }}" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst --strip-components=1 -C "$SDK_PATH"

      - name: Cache dl & toolchain
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SDK_PATH }}/dl
            ${{ env.SDK_PATH }}/staging_dir/toolchain-*
          key: dl-toolchain-${{ matrix.arch }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: dl-toolchain-${{ matrix.arch }}-

      - name: Prepare package
        run: |
          cd "$SDK_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/${PACKAGE_NAME}
          rsync -a --delete "$GITHUB_WORKSPACE"/ package/${PACKAGE_NAME}/
          make defconfig

      - name: Build package
        run: |
          cd "$SDK_PATH"
          set +e
          make package/${PACKAGE_NAME}/clean
          make package/${PACKAGE_NAME}/compile -j$(nproc) V=sc
          exit 0

      - name: Upload ipk artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-ipk
          path: |
            ${{ env.SDK_PATH }}/bin/packages/**/${{ env.PACKAGE_NAME }}_*.ipk
            ${{ env.SDK_PATH }}/bin/packages/**/kmod-usb-redirector-server_*.ipk
