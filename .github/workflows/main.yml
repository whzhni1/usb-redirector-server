name: OpenWrt Multi-Arch Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86
            subtarget: 64
          - arch: aarch64
            target: armvirt
            subtarget: 64
          - arch: mipsel_24kc
            target: ramips
            subtarget: mt7621

    env:
      OPENWRT_VERSION: 23.05.3
      SDK_PATH: /tmp/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download & Extract SDK (verify structure)
        run: |
          set -e
          mkdir -p "$SDK_PATH"
          BASE_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/"

          echo "📡 Fetching SDK list from $BASE_URL"
          SDK_FILE=$(curl -s "$BASE_URL" | grep -oE 'openwrt-sdk-[^"]+\.tar\.(zst|xz)' | head -n 1 || true)

          if [ -z "$SDK_FILE" ]; then
            echo "❌ No SDK found for ${{ matrix.arch }} (${{ matrix.target }}/${{ matrix.subtarget }}), skipping..."
            exit 0
          fi

          echo "✅ Found SDK file: $SDK_FILE"
          curl -fsSL "${BASE_URL}${SDK_FILE}" -o sdk.tar || { echo "❌ Download failed"; exit 0; }

          TMPDIR=$(mktemp -d)
          if [[ "$SDK_FILE" == *.zst ]]; then
            tar --use-compress-program=unzstd -xf sdk.tar -C "$TMPDIR"
          else
            tar -xf sdk.tar -C "$TMPDIR"
          fi

          SDK_DIR=$(find "$TMPDIR" -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)
          if [ -z "$SDK_DIR" ] || [ ! -f "$SDK_DIR/scripts/feeds" ]; then
            echo "❌ SDK structure invalid (missing scripts/feeds), skipping..."
            exit 0
          fi

          rm -rf "$SDK_PATH"
          mv "$SDK_DIR" "$SDK_PATH"

      - name: Update Feeds
        run: |
          cd "$SDK_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy Custom Package
        run: |
          mkdir -p "$SDK_PATH/package/custom"
          cp -r ./my-custom-package "$SDK_PATH/package/custom/"

      - name: Build Package
        run: |
          cd "$SDK_PATH"
          make defconfig
          make package/custom/compile -j$(nproc) V=sc || true

      - name: Collect ipk
        run: |
          mkdir -p artifacts/${{ matrix.arch }}
          find "$SDK_PATH/bin/packages" -name "*.ipk" -exec cp {} artifacts/${{ matrix.arch }}/ \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-ipks
          path: artifacts/${{ matrix.arch }}
