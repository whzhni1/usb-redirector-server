name: build-ImmortalWrt-usb-redirector-server-${{ github.event.inputs.target }}-${{ github.event.inputs.subtarget }}-debug

on:
  workflow_dispatch:
    inputs:
      ImmortalWrt_branch:
        description: 'ImmortalWrt branch or tag'
        default: 'v24.10.2'
      target:
        description: 'ImmortalWrt TARGET'
        default: 'aarch64'
      subtarget:
        description: 'ImmortalWrt SUBTARGET'
        default: 'generic'
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Shanghai
      OPENWRT_BRANCH: ${{ github.event.inputs.ImmortalWrt_branch }}
      TARGET:           ${{ github.event.inputs.target }}
      SUBTARGET:        ${{ github.event.inputs.subtarget }}
      CCACHE_DIR:       ${{ github.workspace }}/.ccache
      MAKE_JOBS:        4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -x
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync unzip \
            file wget subversion zlib1g-dev ccache time xsltproc

      - name: Cache dl and ccache
        uses: actions/cache@v4
        with:
          path: |
            ImmortalWrt/dl
            .ccache
          key: dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ github.sha }}
          restore-keys: |
            dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-
            dl-ccache-${{ env.OPENWRT_BRANCH }}-

      - name: Clone ImmortalWrt
        run: |
          set -x
          rm -rf ImmortalWrt
          git clone --depth 1 -b "${OPENWRT_BRANCH}" https://github.com/ImmortalWrt/ImmortalWrt.git

      - name: Add package into ImmortalWrt tree
        run: |
          set -x
          rm -rf ImmortalWrt/package/usb-redirector-server
          mkdir -p ImmortalWrt/package/usb-redirector-server
          rsync -a --delete usb-redirector-server/ \
            ImmortalWrt/package/usb-redirector-server/ \
            --exclude .git --exclude .github
          ls -R ImmortalWrt/package/usb-redirector-server

      - name: Prepare feeds
        working-directory: ImmortalWrt
        run: |
          set -x
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure target and packages
        working-directory: ImmortalWrt
        run: |
          set -x
          printf "CONFIG_TARGET_%s=y\nCONFIG_TARGET_%s_%s=y\nCONFIG_PACKAGE_usb-redirector-server=y\nCONFIG_PACKAGE_kmod-usb-redirector-server=y\nCONFIG_CCACHE=y\n" \
            "$TARGET" "$TARGET" "$SUBTARGET" > .config
          make defconfig

      - name: Bootstrap toolchain & kernel
        working-directory: ImmortalWrt
        run: |
          set -x
          make -j${MAKE_JOBS} tools/install V=s
          make -j${MAKE_JOBS} toolchain/install V=s
          make -j${MAKE_JOBS} target/linux/prepare V=s
          make -j${MAKE_JOBS} target/linux/compile V=s

      - name: Prepare usb-redirector-server source
        working-directory: ImmortalWrt
        run: |
          set -x
          make package/usb-redirector-server/clean V=s
          make package/usb-redirector-server/prepare V=s
          find build_dir -maxdepth 3 -type d -name 'usb-redirector-server-*' || true

      - name: Build usb-redirector packages
        working-directory: ImmortalWrt
        continue-on-error: true
        run: |
          set -x
          for PKG in usb-redirector-server kmod-usb-redirector-server; do
            make -j${MAKE_JOBS} package/$PKG/{clean,prepare,compile,install} V=s || true
          done

      - name: Collect artifacts
        working-directory: ImmortalWrt
        run: |
          set -x
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          find bin/packages  -type f -name '*usb-redirector-server*.ipk' \
            -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \;
          find bin/targets   -type f -name '*usb-redirector-server*.ipk' \
            -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \;
          (cd "${GITHUB_WORKSPACE}/artifacts" && sha256sum *.ipk > SHA256SUMS)
          ls -lh "${GITHUB_WORKSPACE}/artifacts"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: usb-redirector-server-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}
          path: artifacts/*
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: always()
        with:
          name: "usb-redirector-server-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}"
          tag_name: "build-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}-${{ github.run_id }}"
          files: artifacts/*
          body: |
            自动构建的 usb-redirector-server 包  
            架构: ${{ env.TARGET }}-${{ env.SUBTARGET }}  
            OpenWrt 分支: ${{ env.OPENWRT_BRANCH }}  
            构建时间: ${{ github.run_started_at }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
