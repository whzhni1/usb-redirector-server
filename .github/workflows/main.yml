name: build-openwrt-usb-redirector-aarch64

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch or tag (e.g. v23.05.3, openwrt-23.05)'
        default: 'v23.05.3'
      target:
        description: 'OpenWrt TARGET (e.g. aarch64, rockchip, mediatek, ipq807x)'
        default: 'aarch64'
      subtarget:
        description: 'OpenWrt SUBTARGET (e.g. generic, cortexa53, filogic)'
        default: 'generic'
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      TZ: Asia/Shanghai
      OPENWRT_BRANCH: ${{ inputs.openwrt_branch || 'v23.05.3' }}
      TARGET: ${{ inputs.target || 'aarch64' }}
      SUBTARGET: ${{ inputs.subtarget || 'generic' }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      MAKE_JOBS: 4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync unzip \
            file wget subversion zlib1g-dev ccache time xsltproc

      - name: Cache dl and ccache
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            .ccache
          key: dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ hashFiles('**/*') }}
          restore-keys: |
            dl-ccache-${{ env.OPENWRT_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-
            dl-ccache-${{ env.OPENWRT_BRANCH }}-

      - name: Clone OpenWrt
        run: |
          git clone --depth 1 -b "${OPENWRT_BRANCH}" https://github.com/openwrt/openwrt.git

      - name: Add package into OpenWrt tree
        run: |
          mkdir -p openwrt/package/usb-redirector-server
          rsync -a --delete ./ openwrt/package/usb-redirector-server/ \
            --exclude .git --exclude .github

      - name: Prepare feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure target and packages
        working-directory: openwrt
        run: |
          cat > .config <<EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_BOARD="${TARGET}"
          CONFIG_TARGET_SUBTARGET="${SUBTARGET}"
          CONFIG_PACKAGE_usb-redirector-server=y
          CONFIG_PACKAGE_kmod-usb-redirector-server=y
          CONFIG_CCACHE=y
          EOF
          make defconfig

      - name: Bootstrap toolchain & kernel
        working-directory: openwrt
        run: |
          make -j${MAKE_JOBS} tools/install
          make -j${MAKE_JOBS} toolchain/install
          make -j${MAKE_JOBS} target/linux/prepare
          make -j${MAKE_JOBS} target/linux/compile

      - name: Build usb-redirector packages
        working-directory: openwrt
        run: |
          make -j${MAKE_JOBS} package/usb-redirector-server/clean
          make -j${MAKE_JOBS} package/usb-redirector-server/compile V=s
          make -j${MAKE_JOBS} package/usb-redirector-server/install V=s

      - name: Collect artifacts
        working-directory: openwrt
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          find bin/packages -type f -name 'usb-redirector-server_*.ipk' -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \;
          find bin/targets -type f -name 'kmod-usb-redirector-server_*.ipk' -exec cp -v {} "${GITHUB_WORKSPACE}/artifacts/" \;
          (cd "${GITHUB_WORKSPACE}/artifacts" && sha256sum *.ipk > SHA256SUMS)
          ls -l "${GITHUB_WORKSPACE}/artifacts"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usb-redirector-server-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.OPENWRT_BRANCH }}
          path: artifacts/*
          if-no-files-found: error
