name: Build OpenWrt USB Redirector Server

on:
  workflow_dispatch:

env:
  OPENWRT_VERSION: 23.05.5
  PACKAGE_NAME: usb-redirector-server
  SDK_PATH: /tmp/openwrt

jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64-gnu
            target: x86
            subtarget: 64
          - arch: armvirt-64
            target: armvirt
            subtarget: 64
          # 按需追加你的架构...

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 python3-distutils rsync unzip zlib1g-dev file wget zstd curl

      - name: Cache SDK
        uses: actions/cache@v4
        with:
          path: ${{ env.SDK_PATH }}
          key: sdk-${{ matrix.target }}-${{ matrix.subtarget }}

      - name: Download & Extract SDK (verify structure)
        run: |
          mkdir -p "$SDK_PATH"
          BASE_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/"
          echo "Fetching SDK list from $BASE_URL"

          SDK_FILE=$(curl -s "$BASE_URL" | grep -oE 'openwrt-sdk-[^"]+\.tar\.(zst|xz)' | head -n 1 || true)

          if [ -z "$SDK_FILE" ]; then
            echo "❌ No SDK found for ${{ matrix.arch }} -> skipping"
            exit 0
          fi

          echo "✅ Found: $SDK_FILE"
          curl -fsSL "${BASE_URL}${SDK_FILE}" -o sdk.tar || { echo "❌ Download failed"; exit 0; }

          TMPDIR=$(mktemp -d)
          if [[ "$SDK_FILE" == *.zst ]]; then
            tar --use-compress-program=unzstd -xf sdk.tar -C "$TMPDIR"
          else
            tar -xf sdk.tar -C "$TMPDIR"
          fi

          SDK_DIR=$(find "$TMPDIR" -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)
          if [ -z "$SDK_DIR" ] || [ ! -f "$SDK_DIR/scripts/feeds" ]; then
            echo "❌ SDK structure invalid, skipping"
            exit 0
          fi

          rm -rf "$SDK_PATH"
          mv "$SDK_DIR" "$SDK_PATH"

      - name: Cache dl & toolchain
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.SDK_PATH }}/dl
            ${{ env.SDK_PATH }}/staging_dir/toolchain-*
          key: dl-toolchain-${{ matrix.target }}-${{ matrix.subtarget }}

      - name: Prepare package
        run: |
          cd "$SDK_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/${PACKAGE_NAME}
          rsync -a --delete "$GITHUB_WORKSPACE"/ package/${PACKAGE_NAME}/
          make defconfig

      - name: Build package
        run: |
          cd "$SDK_PATH"
          make package/${PACKAGE_NAME}/clean
          make package/${PACKAGE_NAME}/compile V=s

      - name: Upload to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-ipk
          path: |
            ${{ env.SDK_PATH }}/bin/packages/**/${{ env.PACKAGE_NAME }}_*.ipk
            ${{ env.SDK_PATH }}/bin/packages/**/kmod-${{ env.PACKAGE_NAME }}_*.ipk
