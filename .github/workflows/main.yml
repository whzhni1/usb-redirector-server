name: Build USB Redirector Server IPK Packages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  OPENWRT_VERSION: v23.05.3

jobs:
  build-ipk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    strategy:
      fail-fast: false
      matrix:
        target: 
          - arch: x86_64
            config: CONFIG_TARGET_x86=y\nCONFIG_TARGET_x86_64=y
          - arch: ramips_mt7621  
            config: CONFIG_TARGET_ramips=y\nCONFIG_TARGET_ramips_mt7621=y
          - arch: ath79_generic
            config: CONFIG_TARGET_ath79=y\nCONFIG_TARGET_ath79_generic=y
          - arch: mediatek_filogic
            config: CONFIG_TARGET_mediatek=y\nCONFIG_TARGET_mediatek_filogic=y

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache
        sudo docker image prune -af
        df -h

    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
        gettext git java-propose-classpath libelf-dev libncurses5-dev \
        libncursesw5-dev libssl-dev python3 python3-dev python3-distutils \
        python3-setuptools unzip wget rsync subversion swig time xsltproc \
        zlib1g-dev libpam0g-dev curl

    - name: Configure git for better network handling
      run: |
        git config --global http.postBuffer 1048576000
        git config --global http.maxRequestBuffer 100M
        git config --global core.compression 0
        git config --global http.lowSpeedLimit 0
        git config --global http.lowSpeedTime 999999

    - name: Download OpenWrt source code
      run: |
        echo "Downloading OpenWrt source..."
        for i in {1..3}; do
          echo "Attempt $i to clone OpenWrt..."
          if git clone --depth 1 --branch ${{ env.OPENWRT_VERSION }} https://git.openwrt.org/openwrt/openwrt.git openwrt; then
            echo "Successfully cloned OpenWrt"
            break
          else
            echo "Clone attempt $i failed, retrying..."
            rm -rf openwrt
            sleep 10
          fi
        done
        
        if [ ! -d "openwrt" ]; then
          echo "Failed to clone OpenWrt after 3 attempts"
          exit 1
        fi

    - name: Verify and copy USB Redirector package
      run: |
        echo "Verifying USB Redirector package structure..."
        ls -la
        
        # Check if usb-redirector-server directory exists
        if [ -d "./usb-redirector-server" ]; then
          echo "Found usb-redirector-server directory"
          ls -la ./usb-redirector-server/
          
          # Verify expected structure
          if [ -f "./usb-redirector-server/Makefile" ]; then
            echo "✓ Found Makefile"
          else
            echo "✗ Missing Makefile"
            exit 1
          fi
          
          if [ -d "./usb-redirector-server/src" ]; then
            echo "✓ Found src directory"
            ls -la ./usb-redirector-server/src/
          else
            echo "✗ Missing src directory"
          fi
          
          if [ -d "./usb-redirector-server/files" ]; then
            echo "✓ Found files directory"
            ls -la ./usb-redirector-server/files/
          else
            echo "✗ Missing files directory"
          fi
          
          # Copy the package to OpenWrt
          echo "Copying USB Redirector package to OpenWrt build system..."
          cp -r ./usb-redirector-server openwrt/package/
          
          echo "Package copied successfully"
          echo "Contents in OpenWrt package directory:"
          ls -la openwrt/package/usb-redirector-server/
          
        else
          echo "ERROR: usb-redirector-server directory not found!"
          echo "Current directory contents:"
          ls -la
          exit 1
        fi

    - name: Update feeds with retry mechanism
      run: |
        cd openwrt
        
        # Function to retry feed operations
        retry_feed_operation() {
          local operation=$1
          local max_attempts=3
          local attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt for feed $operation..."
            if timeout 600 ./scripts/feeds $operation; then
              echo "Feed $operation successful"
              return 0
            else
              echo "Feed $operation attempt $attempt failed"
              if [ $attempt -lt $max_attempts ]; then
                echo "Waiting 30 seconds before retry..."
                sleep 30
                # Clean up partial downloads
                rm -rf feeds/packages feeds/luci feeds/routing feeds/telephony
              fi
              attempt=$((attempt + 1))
            fi
          done
          
          echo "Feed $operation failed after $max_attempts attempts"
          return 1
        }
        
        # Update feeds with retry
        retry_feed_operation "update -a"

    - name: Install feeds
      run: |
        cd openwrt
        
        echo "Installing feeds..."
        # Install essential packages
        ./scripts/feeds install -a -f

    - name: Verify package in build system
      run: |
        cd openwrt
        echo "Verifying USB Redirector package is recognized by build system..."
        
        # Check if package shows up in menuconfig
        echo "Checking if package is available in build system..."
        make defconfig
        
        # Try to see if the package is available
        if grep -r "usb-redirector-server" tmp/.config-package.in 2>/dev/null; then
          echo "✓ USB Redirector Server package found in build system"
        else
          echo "! Package may not be fully integrated yet, continuing..."
        fi

    - name: Configure OpenWrt build
      run: |
        cd openwrt
        
        # Create base configuration
        echo -e "${{ matrix.target.config }}" > .config
        
        # Add USB Redirector and dependencies configuration
        cat >> .config << EOF
        # Target configuration for ${{ matrix.target.arch }}
        ${{ matrix.target.config }}
        
        # USB Redirector Server packages
        CONFIG_PACKAGE_usb-redirector-server=m
        CONFIG_PACKAGE_kmod-usb-redirector-server=m
        
        # USB Support modules
        CONFIG_USB_SUPPORT=y
        CONFIG_PACKAGE_kmod-usb-core=y
        CONFIG_PACKAGE_kmod-usb-ohci=y
        CONFIG_PACKAGE_kmod-usb-uhci=y
        CONFIG_PACKAGE_kmod-usb2=y
        CONFIG_PACKAGE_kmod-usb3=y
        
        # USB device support
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_kmod-usb-storage-extras=y
        
        # Required libraries
        CONFIG_PACKAGE_libusb-1.0=y
        CONFIG_PACKAGE_libudev-zero=y
        CONFIG_PACKAGE_libpthread=y
        
        # Build options
        CONFIG_DEVEL=y
        CONFIG_CCACHE=y
        CONFIG_BUILD_LOG=y
        CONFIG_BUILD_LOG_DIR="./logs"
        
        # Package build options
        CONFIG_PKG_BUILD_PARALLEL=y
        CONFIG_PKG_BUILD_USE_JOBSERVER=y
        EOF
        
        # Expand configuration
        make defconfig
        
        echo "Build configuration completed"
        echo "Verifying USB Redirector in final config:"
        grep -i redirector .config || echo "USB Redirector not found in final config"

    - name: Download dependencies
      run: |
        cd openwrt
        echo "Downloading package dependencies..."
        make download -j8 V=s || make download -j1 V=s

    - name: Build tools and toolchain
      run: |
        cd openwrt
        echo "Building tools..."
        make tools/install -j$(nproc) V=s
        
        echo "Building toolchain..."
        make toolchain/install -j$(nproc) V=s

    - name: Build target dependencies
      run: |
        cd openwrt
        echo "Building target kernel and base system..."
        make target/linux/compile -j$(nproc) V=s

    - name: Build USB Redirector packages
      run: |
        cd openwrt
        
        echo "Building USB Redirector Server package..."
        
        # Build package step by step with detailed logging
        echo "=== Cleaning previous builds ==="
        make package/usb-redirector-server/clean V=s || echo "Clean step completed (may not exist yet)"
        
        echo "=== Preparing package ==="
        make package/usb-redirector-server/prepare V=s
        
        echo "=== Compiling package ==="
        make package/usb-redirector-server/compile V=s
        
        echo "=== Installing package ==="
        make package/usb-redirector-server/install V=s
        
        echo "=== Building package index ==="
        make package/index V=s

    - name: Collect and verify IPK packages
      run: |
        cd openwrt
        mkdir -p ../artifacts/${{ matrix.target.arch }}
        
        echo "Searching for USB Redirector IPK packages..."
        
        # Search for all redirector-related packages
        echo "Looking for packages in bin/ directory:"
        find bin/ -name "*.ipk" | grep -i redirector || echo "No redirector IPK packages found"
        
        # Copy any found packages
        found_count=0
        for pkg in $(find bin/ -name "*usb-redirector*.ipk" -o -name "*redirector*.ipk"); do
          if [ -f "$pkg" ]; then
            echo "Found package: $pkg"
            cp "$pkg" ../artifacts/${{ matrix.target.arch }}/
            found_count=$((found_count + 1))
          fi
        done
        
        echo "Found $found_count USB Redirector packages"
        
        # List all artifacts
        echo "Collected artifacts:"
        ls -la ../artifacts/${{ matrix.target.arch }}/ || echo "No artifacts collected"
        
        # Create installation guide
        if [ $found_count -gt 0 ]; then
          cat > ../artifacts/${{ matrix.target.arch }}/INSTALL.md << EOF
        # USB Redirector Server Installation Guide
        
        ## Package Information
        - Architecture: ${{ matrix.target.arch }}
        - Built on: $(date)
        - OpenWrt Version: ${{ env.OPENWRT_VERSION }}
        - Packages found: $found_count
        
        ## Installation Steps
        
        1. **Transfer packages to your OpenWrt device:**
           \`\`\`bash
           scp *.ipk root@your-router-ip:/tmp/
           \`\`\`
        
        2. **Install packages (install kernel module first if present):**
           \`\`\`bash
           ssh root@your-router-ip
           
           # If kernel module exists, install it first
           opkg install /tmp/kmod-usb-redirector-server*.ipk
           
           # Install main package
           opkg install /tmp/usb-redirector-server*.ipk
           \`\`\`
        
        3. **Start and enable service:**
           \`\`\`bash
           /etc/init.d/usb-redirector-server start
           /etc/init.d/usb-redirector-server enable
           \`\`\`
        
        4. **Check service status:**
           \`\`\`bash
           /etc/init.d/usb-redirector-server status
           \`\`\`
        
        ## Troubleshooting
        
        - Check if USB devices are detected: \`lsusb\`
        - Check service logs: \`logread | grep redirector\`
        - Verify USB modules are loaded: \`lsmod | grep usb\`
        EOF
        else
          cat > ../artifacts/${{ matrix.target.arch }}/BUILD_FAILED.txt << EOF
        Build failed for ${{ matrix.target.arch }}
        
        No USB Redirector IPK packages were generated.
        Check the build logs for errors.
        
        Common issues:
        1. Missing dependencies in Makefile
        2. Compilation errors in source code
        3. Missing required libraries or headers
        EOF
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: usb-redirector-ipk-${{ matrix.target.arch }}
        path: artifacts/${{ matrix.target.arch }}/*
        retention-days: 30

    - name: Debug information on failure
      if: failure()
      run: |
        cd openwrt
        echo "=== BUILD DEBUG INFORMATION ==="
        
        echo "Package directory contents:"
        ls -la package/usb-redirector-server/ || echo "Package directory not found"
        
        echo "Build logs:"
        find logs/ -name "*usb-redirector*" -type f | head -5 | while read log; do
          echo "=== $log ==="
          tail -50 "$log"
        done
        
        echo "Available IPK packages:"
        find bin/ -name "*.ipk" | head -20
        
        echo "Config check:"
        grep -i redirector .config || echo "No redirector config found"

  create-release:
    needs: build-ipk
    runs-on: ubuntu-22.04
    if: success()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-packages

    - name: Organize packages for release
      run: |
        mkdir -p release-packages
        
        echo "Organizing packages from all architectures..."
        find all-packages/ -name "*.ipk" -exec cp {} release-packages/ \;
        find all-packages/ -name "*.md" -exec cp {} release-packages/ \;
        
        # Count packages per architecture
        for arch in x86_64 ramips_mt7621 ath79_generic mediatek_filogic; do
          count=$(find all-packages/usb-redirector-ipk-$arch/ -name "*.ipk" 2>/dev/null | wc -l)
          echo "Architecture $arch: $count packages"
        done
        
        echo "Total packages collected:"
        ls -la release-packages/

    - name: Upload release packages
      uses: actions/upload-artifact@v4
      with:
        name: usb-redirector-all-architectures
        path: release-packages/*
        retention-days: 90

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: release-packages/*.ipk
        body: |
          # USB Redirector Server IPK Packages
          
          Pre-built IPK packages for multiple OpenWrt architectures.
          
          ## Supported Architectures
          - **x86_64**: PC/VM builds
          - **ramips_mt7621**: MediaTek MT7621 routers
          - **ath79_generic**: Atheros AR71xx/AR724x/AR913x/AR933x routers  
          - **mediatek_filogic**: MediaTek MT7986/MT7981 routers
          
          ## Installation
          See the included INSTALL.md files for detailed installation instructions.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
